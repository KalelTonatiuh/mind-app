<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mind — Autonomous Psyche</title>
    <style>
        /* ═══════════════════════════════════════════════════════
           CORE STYLING
           ═══════════════════════════════════════════════════════ */
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
            --bg:#0c0c0d; --bg2:#131315; --bg3:#191920;
            --b:rgba(255,255,255,0.055); --b2:rgba(255,255,255,0.1);
            --t:#dad7cf; --t2:#68665f; --t3:#3a3835;
            --f:'Georgia', serif; --m:'Courier New', monospace;
            --c-somatic: #8a8a8e; --c-belief: #4a7a5a; --c-mem: #7a6a4a;
            --c-tom: #4a6a7a; --c-need: #5a4a7a; --c-rum: #71717a;
        }

        body { background:var(--bg); color:var(--t); font-family:var(--f); min-height:100vh; padding:18px 16px 60px; max-width:660px; margin:0 auto; overflow-x: hidden; }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-bottom:12px; border-bottom:0.5px solid var(--b); }
        .avatar { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:1.5px solid var(--b2);background:var(--bg3); }
        .mind-label { font-size:10px;color:var(--t3);text-transform:uppercase;font-family:var(--m); letter-spacing: 2px; }
        .mind-status { font-size:12px;color:var(--t2);font-style:italic;margin-top:3px; }

        .panel { border-radius:8px;border:0.5px solid var(--b);background:var(--bg2);padding:9px 11px;margin-bottom:9px; }
        .panel-title { font-size:9px;color:var(--t3);font-family:var(--m);text-transform:uppercase;display:flex;justify-content:space-between; margin-bottom: 5px; }

        #life-timeline { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
        .timeline-event { min-width: 120px; padding: 6px; background: var(--bg3); border: 0.5px solid var(--b); border-radius: 4px; font-size: 9px; font-family: var(--m); color: var(--t2); }

        .thought-stream { border-radius:8px;border:0.5px solid var(--b);background:var(--bg2);padding:12px;height:300px;overflow-y:auto; margin-bottom:10px; display: flex; flex-direction: column-reverse; }
        .thought { padding:6px 0; border-bottom:0.5px solid var(--b); font-size:13px; display:flex; gap:10px; }
        .thought .ts { font-size:9px; color:var(--t3); font-family:var(--m); min-width: 40px; }
        .thought.somatic { color: var(--c-somatic); font-style: italic; }
        .thought.memory { color: var(--c-mem); }
        
        .egrid { display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:9px; }
        .ebar { border-radius:5px;padding:5px 6px;border:0.5px solid var(--b);background:var(--bg2); }
        .ebar .el { font-size:9px;color:var(--t3);font-family:var(--m); }
        .ebar .et { height:2px;background:rgba(255,255,255,.04); margin-top: 4px; }
        .ebar .ef { height:100%; transition: width 0.8s; background: var(--t2); }

        .evbtn { border-radius:6px;padding:6px 10px;border:0.5px solid var(--b2);background:var(--bg3);font-size:10px;color:var(--t2);cursor:pointer; font-family: var(--m); }
        .evbtn:hover { color:white; border-color:var(--t2); }
        
        #semantic-map { width: 100%; height: 80px; background: #080809; border-radius: 4px; border: 0.5px solid var(--b); }
        
        input[type="text"] { width:100%;background:var(--bg2);border:0.5px solid var(--b2);color:white;padding:10px;border-radius:6px; outline:none; font-family:var(--f); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="avatar" id="avatar">👶</div>
    <div style="flex:1">
        <div class="mind-label">Somatic Mind Engine v1.0</div>
        <div class="mind-status" id="status">Awake - Processing Soma</div>
    </div>
    <button class="evbtn" onclick="location.reload()">Reset</button>
</div>

<!-- TOP METRICS -->
<div class="egrid">
    <div class="ebar"><div class="el">Cortisol</div><div class="et"><div id="bar-cortisol" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Oxytocin</div><div class="et"><div id="bar-oxytocin" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Dopamine</div><div class="et"><div id="bar-dopamine" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Ego Strength</div><div class="et"><div id="bar-ego" class="ef"></div></div></div>
</div>

<!-- NARRATIVE & TIMELINE -->
<div class="panel">
    <div class="panel-title">Life Timeline</div>
    <div id="life-timeline"></div>
</div>

<div class="panel">
    <div class="panel-title">Semantic Map (Neural Density)</div>
    <canvas id="semantic-map"></canvas>
</div>

<!-- THOUGHT STREAM -->
<div class="thought-stream" id="stream"></div>

<!-- INPUTS -->
<div class="panel">
    <div class="panel-title">External Stimuli</div>
    <input type="text" id="event-input" placeholder="e.g., 'Caregiver leaves the room' or 'Loud noise'...">
    <div style="display:flex; gap:5px;">
        <button class="evbtn" style="flex:2" onclick="processManualEvent()">Submit Stimulus</button>
        <button class="evbtn" style="flex:1" onclick="fastForwardPreset('safe')">Safe Growth</button>
        <button class="evbtn" style="flex:1" onclick="fastForwardPreset('hard')">Hard Growth</button>
    </div>
    <div id="ff-progress" style="font-size:9px; color:var(--t3); margin-top:5px; font-family:var(--m);"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CORE ENGINE STATE
   ═══════════════════════════════════════════════════════ */
const Mind = {
    // 1. Biological Foundation
    chemistry: { cortisol: 20, oxytocin: 50, dopamine: 30, ego: 50 },
    soma: { breath: 'steady', tension: 'low', throat: 'open', heartRate: 65 },
    
    // 2. Developmental State
    age: 0, // In months
    stage: 'Pre-verbal',
    attachment: 'Undifferentiated',
    
    // 3. Memory & Language
    memories: [],
    narrative: "Existence begins in the body.",
    semanticNet: new Map(),
    
    // 4. Defense Mechanisms
    activeDefense: 'None',
    
    // 5. Config
    heartbeatRate: 4500,
    isProcessing: false
};

const PRIMITIVES = ["throat", "chest", "jaw", "breath", "morning", "void", "weight", "pulse"];

/* ═══════════════════════════════════════════════════════
   THE HEARTBEAT (MAIN LOOP)
   ═══════════════════════════════════════════════════════ */
function pulse() {
    if (Mind.isProcessing) return;

    // A. Biological Decay/Fluctuation
    Mind.chemistry.cortisol += (Math.random() * 4) - 2;
    Mind.chemistry.oxytocin -= 0.5;
    
    // B. Somatic Interpretation
    let somaticSignal = "";
    if (Mind.chemistry.cortisol > 60) {
        Mind.soma.throat = "tight";
        Mind.soma.tension = "high";
        somaticSignal = "Throat tight. Chest heavy. High cortisol alarm.";
        Mind.activeDefense = Mind.chemistry.ego < 40 ? "Regression" : "Reaction Formation";
    } else {
        Mind.soma.throat = "open";
        Mind.soma.tension = "low";
        somaticSignal = "Breath steady. Pulse rhythmic.";
        Mind.activeDefense = "None";
    }

    // C. Dream Cycles (Hebbian linking if cortisol is low)
    if (Mind.chemistry.cortisol < 30) {
        performHebbianLinking();
    }

    // D. Output to UI
    logThought(somaticSignal, "somatic");
    updateUI();
}

/* ═══════════════════════════════════════════════════════
   SYSTEM METHODS
   ═══════════════════════════════════════════════════════ */

function processManualEvent(customText = null) {
    const input = document.getElementById('event-input');
    const val = customText || input.value;
    if (!val) return;

    // 1. Somatic Impact
    if (val.toLowerCase().includes("loud") || val.toLowerCase().includes("leaves") || val.toLowerCase().includes("hit")) {
        Mind.chemistry.cortisol += 25;
        Mind.chemistry.oxytocin -= 15;
        logThought(`External shock: ${val}. Somatic alarm triggered.`, "somatic");
    } else {
        Mind.chemistry.oxytocin += 20;
        Mind.chemistry.cortisol -= 10;
        logThought(`External soothe: ${val}. Oxytocin rising.`, "somatic");
    }

    // 2. Memory Encoding (with Reconsolidation logic)
    const mem = {
        text: val,
        cortisolAtTime: Mind.chemistry.cortisol,
        age: Mind.age,
        timestamp: new Date().toLocaleTimeString()
    };
    Mind.memories.push(mem);
    
    // 3. Narrative Update
    if (Mind.age > 12) {
        Mind.stage = "Verbal / Symbolic";
        updateLifeTimeline(val);
    }

    input.value = "";
    updateUI();
}

async function fastForwardPreset(type) {
    const progress = document.getElementById('ff-progress');
    Mind.isProcessing = true;
    
    for (let i = 0; i < 5; i++) {
        Mind.age += 6;
        progress.innerText = `Aging... Year ${Math.floor(Mind.age/12)}. Processing Life Themes.`;
        
        if (type === 'hard') {
            Mind.chemistry.cortisol += 10;
            Mind.chemistry.ego -= 5;
            Mind.attachment = "Disorganized";
            processManualEvent("Caregiver neglect/stress incident");
        } else {
            Mind.chemistry.oxytocin += 10;
            Mind.chemistry.ego += 5;
            Mind.attachment = "Secure";
            processManualEvent("Attuned caregiver interaction");
        }
        await new Promise(r => setTimeout(r, 600));
    }
    
    progress.innerText = "Development integrated.";
    Mind.isProcessing = false;
    setTimeout(() => progress.innerText = "", 2000);
    updateUI();
}

function performHebbianLinking() {
    // Randomly link two primitive concepts when safe
    const p1 = PRIMITIVES[Math.floor(Math.random() * PRIMITIVES.length)];
    const p2 = PRIMITIVES[Math.floor(Math.random() * PRIMITIVES.length)];
    if (p1 !== p2) {
        const link = `${p1}_${p2}`;
        Mind.semanticNet.set(link, (Mind.semanticNet.get(link) || 0) + 1);
        drawSemanticMap();
    }
}

/* ═══════════════════════════════════════════════════════
   UI & RENDERING
   ═══════════════════════════════════════════════════════ */
function logThought(text, type) {
    const stream = document.getElementById('stream');
    const div = document.createElement('div');
    div.className = `thought ${type}`;
    div.innerHTML = `<span class="ts">${new Date().toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span> <span class="tx">${text}</span>`;
    stream.prepend(div);
}

function updateUI() {
    document.getElementById('bar-cortisol').style.width = `${Math.min(Mind.chemistry.cortisol, 100)}%`;
    document.getElementById('bar-oxytocin').style.width = `${Math.min(Mind.chemistry.oxytocin, 100)}%`;
    document.getElementById('bar-dopamine').style.width = `${Math.min(Mind.chemistry.dopamine, 100)}%`;
    document.getElementById('bar-ego').style.width = `${Math.min(Mind.chemistry.ego, 100)}%`;
    
    document.getElementById('status').innerText = `${Mind.stage} | Attachment: ${Mind.attachment} | Defense: ${Mind.activeDefense}`;
    document.getElementById('avatar').innerText = Mind.age < 12 ? "👶" : Mind.age < 216 ? "🧑" : "🧓";
}

function updateLifeTimeline(eventText) {
    const container = document.getElementById('life-timeline');
    const div = document.createElement('div');
    div.className = 'timeline-event';
    div.innerHTML = `<strong>Age ${Math.floor(Mind.age/12)}y</strong><br>${eventText}`;
    container.appendChild(div);
}

function drawSemanticMap() {
    const canvas = document.getElementById('semantic-map');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#4a7a5a";
    Mind.semanticNet.forEach((weight, link) => {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        ctx.beginPath();
        ctx.arc(x, y, weight * 2, 0, Math.PI * 2);
        ctx.fill();
    });
}

// Global functions for HTML access
window.fastForwardPreset = fastForwardPreset;
window.processManualEvent = processManualEvent;

// Start Engine
setInterval(pulse, Mind.heartbeatRate);
updateUI();
logThought("Somatic engine initialized. Monitoring internal state...", "somatic");

</script>
</body>
</html>

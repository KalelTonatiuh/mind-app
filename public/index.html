<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mind — Full Autonomous Engine</title>
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
            --bg:#0c0c0d; --bg2:#131315; --bg3:#191920;
            --b:rgba(255,255,255,0.055); --b2:rgba(255,255,255,0.1);
            --t:#dad7cf; --t2:#68665f; --t3:#3a3835;
            --f:'Georgia', serif; --m:'Courier New', monospace;
            --c-somatic: #8a8a8e; --c-belief: #4a7a5a; --c-mem: #7a6a4a;
            --c-shadow: #7a4a4a; --c-need: #5a4a7a;
        }

        body { background:var(--bg); color:var(--t); font-family:var(--f); min-height:100vh; padding:18px 16px 60px; max-width:660px; margin:0 auto; overflow-x: hidden; }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-bottom:12px; border-bottom:0.5px solid var(--b); }
        .avatar { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:1.5px solid var(--b2);background:var(--bg3); }
        .mind-label { font-size:10px;color:var(--t3);text-transform:uppercase;font-family:var(--m); letter-spacing: 2px; }
        .mind-status { font-size:11px;color:var(--t2);font-style:italic;margin-top:3px; }

        .panel { border-radius:8px;border:0.5px solid var(--b);background:var(--bg2);padding:9px 11px;margin-bottom:9px; }
        .panel-title { font-size:9px;color:var(--t3);font-family:var(--m);text-transform:uppercase;display:flex;justify-content:space-between; margin-bottom: 5px; }

        #life-timeline { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
        .timeline-event { min-width: 140px; padding: 6px; background: var(--bg3); border: 0.5px solid var(--b); border-radius: 4px; font-size: 9px; font-family: var(--m); color: var(--t2); }

        .thought-stream { border-radius:8px;border:0.5px solid var(--b);background:var(--bg2);padding:12px;height:280px;overflow-y:auto; margin-bottom:10px; display: flex; flex-direction: column-reverse; }
        .thought { padding:6px 0; border-bottom:0.5px solid var(--b); font-size:13px; display:flex; gap:10px; }
        .thought .ts { font-size:9px; color:var(--t3); font-family:var(--m); min-width: 45px; }
        .thought.somatic { color: var(--c-somatic); font-style: italic; }
        .thought.memory { color: var(--c-mem); }
        .thought.shadow { color: var(--c-shadow); font-weight: bold; }
        .thought.introject { color: #8a7a9e; font-style: italic; border-left: 2px solid var(--c-need); padding-left: 5px; }
        
        .egrid { display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:9px; }
        .ebar { border-radius:5px;padding:5px 6px;border:0.5px solid var(--b);background:var(--bg2); }
        .ebar .el { font-size:9px;color:var(--t3);font-family:var(--m); }
        .ebar .et { height:2px;background:rgba(255,255,255,.04); margin-top: 4px; }
        .ebar .ef { height:100%; transition: width 0.8s; background: var(--t2); }

        .evbtn { border-radius:6px;padding:6px 10px;border:0.5px solid var(--b2);background:var(--bg3);font-size:10px;color:var(--t2);cursor:pointer; font-family: var(--m); }
        .evbtn:hover { color:white; border-color:var(--t2); }
        
        input[type="text"] { width:100%;background:var(--bg2);border:0.5px solid var(--b2);color:white;padding:10px;border-radius:6px; outline:none; font-family:var(--f); margin-bottom: 10px; }
        #journal-box { font-size: 11px; color: var(--t2); font-style: italic; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 4px; min-height: 30px; }
    </style>
</head>
<body>

<div class="header">
    <div class="avatar" id="avatar">👶</div>
    <div style="flex:1">
        <div class="mind-label">Autonomous Psyche Engine v2.0</div>
        <div class="mind-status" id="status">Awake - Interoception Active</div>
    </div>
    <button class="evbtn" onclick="location.reload()">Reset</button>
</div>

<div class="egrid">
    <div class="ebar"><div class="el">Cortisol</div><div class="et"><div id="bar-cortisol" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Oxytocin</div><div class="et"><div id="bar-oxytocin" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Ego Strength</div><div class="et"><div id="bar-ego" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Shadow Load</div><div id="bar-shadow-color" class="et"><div id="bar-shadow" class="ef" style="background:var(--c-shadow)"></div></div></div>
</div>

<div class="panel">
    <div class="panel-title">Narrative Journal (Autonomous Synthesis)</div>
    <div id="journal-box">Waiting for life events to form narrative...</div>
</div>

<div class="panel">
    <div class="panel-title">Life Timeline</div>
    <div id="life-timeline"></div>
</div>

<div class="thought-stream" id="stream"></div>

<div class="panel">
    <div class="panel-title">External Stimuli & Development</div>
    <input type="text" id="event-input" placeholder="Interact with the mind...">
    <div style="display:flex; gap:5px;">
        <button class="evbtn" style="flex:2" onclick="processManualEvent()">Submit Stimulus</button>
        <button class="evbtn" style="flex:1" onclick="fastForwardPreset('safe')">Safe Growth</button>
        <button class="evbtn" style="flex:1" onclick="fastForwardPreset('hard')">Hard Growth</button>
    </div>
    <div id="ff-progress" style="font-size:9px; color:var(--t3); margin-top:5px; font-family:var(--m);"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   EXTENDED PSYCHOLOGICAL STATE
   ═══════════════════════════════════════════════════════ */
const Mind = {
    chemistry: { cortisol: 20, oxytocin: 50, ego: 50, shadow: 10 },
    age: 0,
    stage: 'Pre-verbal',
    attachment: 'Undifferentiated',
    activeDefense: 'None',
    
    // Systems
    memories: [],
    shadowNodes: [], // Repressed thoughts
    introjects: { // The internal voices of the caregiver
        critic: "You are being too loud.",
        nurturer: "You are safe now."
    },
    
    // Circadian / Heartbeat
    isDay: true,
    tickCount: 0,
    heartbeatRate: 4500
};

const PRIMITIVES = ["throat", "chest", "jaw", "breath", "morning", "void", "pulse"];

/* ═══════════════════════════════════════════════════════
   THE ENGINE LOGIC (SYSTEMS)
   ═══════════════════════════════════════════════════════ */

function pulse() {
    Mind.tickCount++;
    
    // 1. BIOLOGICAL NOISE & SHADOW LEAK
    // If shadow load is high, it "leaks" as unexplained cortisol
    if (Mind.chemistry.shadow > 40) {
        Mind.chemistry.cortisol += 2;
        if (Math.random() > 0.8) logThought("Unexplained somatic anxiety. Pressure in chest.", "shadow");
    }

    // 2. DEFENSE HIERARCHY
    // Logic: As stress (cortisol) rises, defense shifts from Sublimation -> Intellectualization -> Denial -> Regression
    const stress = Mind.chemistry.cortisol;
    if (stress < 30) Mind.activeDefense = "Sublimation";
    else if (stress < 50) Mind.activeDefense = "Intellectualization";
    else if (stress < 70) Mind.activeDefense = "Denial";
    else Mind.activeDefense = "Regression";

    // 3. MEMORY RECONSOLIDATION (The Healing Mechanic)
    // If a painful memory is recalled while Oxytocin is high, its cortisol weight drops
    if (Mind.chemistry.oxytocin > 70 && Mind.memories.length > 0) {
        const randomMem = Mind.memories[Math.floor(Math.random() * Mind.memories.length)];
        if (randomMem.cortisolWeight > 20) {
            randomMem.cortisolWeight -= 5;
            logThought(`Somatic anchoring: Old memory of '${randomMem.text.substring(0,10)}...' feels less threatening.`, "somatic");
        }
    }

    // 4. THE INTROJECT (Internal Voice)
    // Stress triggers the stored caregiver reactions
    if (stress > 60 && Math.random() > 0.7) {
        const voice = Mind.attachment === "Secure" ? Mind.introjects.nurturer : Mind.introjects.critic;
        logThought(`[Inner Voice]: "${voice}"`, "introject");
    }

    // 5. NARRATIVE GENERATION (Every 10 pulses)
    if (Mind.tickCount % 10 === 0) synthesizeNarrative();

    // 6. DEFAULT SOMATIC OUTPUT
    const status = stress > 60 ? "Breath shallow. Jaw clenched." : "Breath steady. Pulse rhythmic.";
    logThought(status, "somatic");

    updateUI();
}

function processManualEvent(customText = null) {
    const input = document.getElementById('event-input');
    const val = customText || input.value;
    if (!val) return;

    // Gottman 5:1 Negativity Bias implementation
    const isNegative = val.toLowerCase().match(/(hit|bad|leave|angry|no|hurt|cry|loud)/);
    
    if (isNegative) {
        Mind.chemistry.cortisol += 20;
        Mind.chemistry.oxytocin -= 10;
        Mind.chemistry.shadow += 5; // Negative events increase the shadow load
    } else {
        Mind.chemistry.oxytocin += 15;
        Mind.chemistry.cortisol -= 8;
    }

    // Encode Memory
    Mind.memories.push({
        text: val,
        cortisolWeight: Mind.chemistry.cortisol,
        timestamp: new Date().toLocaleTimeString()
    });

    updateLifeTimeline(val);
    input.value = "";
    updateUI();
}

function synthesizeNarrative() {
    const journal = document.getElementById('journal-box');
    if (Mind.memories.length < 3) return;
    
    // Simple emergent narrative builder based on dominant chemistry
    let theme = Mind.chemistry.cortisol > 50 ? "The world feels precarious and loud." : "There is a budding sense of predictability.";
    if (Mind.attachment === "Disorganized") theme = "Care is a source of both safety and fear.";
    
    journal.innerText = `${theme} I remember ${Mind.memories[Mind.memories.length-1].text}.`;
}

async function fastForwardPreset(type) {
    const progress = document.getElementById('ff-progress');
    for (let i = 0; i < 5; i++) {
        Mind.age += 12;
        progress.innerText = `Year ${Math.floor(Mind.age/12)}: Processing developmental schemas...`;
        
        if (type === 'hard') {
            Mind.chemistry.cortisol += 15;
            Mind.chemistry.shadow += 10;
            Mind.attachment = "Disorganized";
            Mind.introjects.critic = "You are a burden.";
            processManualEvent("Felt unsafe and ignored");
        } else {
            Mind.chemistry.oxytocin += 15;
            Mind.chemistry.ego += 10;
            Mind.attachment = "Secure";
            processManualEvent("Felt seen and understood");
        }
        await new Promise(r => setTimeout(r, 600));
    }
    progress.innerText = "Identity updated.";
    Mind.stage = "Self-Aware";
    updateUI();
}

/* ═══════════════════════════════════════════════════════
   UI & RENDERING
   ═══════════════════════════════════════════════════════ */
function logThought(text, type) {
    const stream = document.getElementById('stream');
    const div = document.createElement('div');
    div.className = `thought ${type}`;
    div.innerHTML = `<span class="ts">${new Date().toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span> <span class="tx">${text}</span>`;
    stream.prepend(div);
}

function updateUI() {
    document.getElementById('bar-cortisol').style.width = `${Math.min(Mind.chemistry.cortisol, 100)}%`;
    document.getElementById('bar-oxytocin').style.width = `${Math.min(Mind.chemistry.oxytocin, 100)}%`;
    document.getElementById('bar-ego').style.width = `${Math.min(Mind.chemistry.ego, 100)}%`;
    document.getElementById('bar-shadow').style.width = `${Math.min(Mind.chemistry.shadow, 100)}%`;
    
    document.getElementById('status').innerText = `${Mind.stage} | Attachment: ${Mind.attachment} | Defense: ${Mind.activeDefense}`;
    document.getElementById('avatar').innerText = Mind.age < 12 ? "👶" : Mind.age < 216 ? "🧑" : "🧓";
}

function updateLifeTimeline(eventText) {
    const container = document.getElementById('life-timeline');
    const div = document.createElement('div');
    div.className = 'timeline-event';
    div.innerHTML = `<strong>Age ${Math.floor(Mind.age/12)}y</strong><br>${eventText}`;
    container.prepend(div);
}

window.fastForwardPreset = fastForwardPreset;
window.processManualEvent = processManualEvent;

setInterval(pulse, Mind.heartbeatRate);
updateUI();
logThought("Somatic engine initialized. Interoception online.", "somatic");

</script>
</body>
</html>

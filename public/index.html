<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mind</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0c0c0d; --bg2:#131315; --bg3:#191920;
  --b:rgba(255,255,255,0.055); --b2:rgba(255,255,255,0.1);
  --t:#dad7cf; --t2:#68665f; --t3:#3a3835;
  --f:'Georgia', serif; --m:'Courier New', monospace;
  /* Thought Kind Colors */
  --c-somatic: #5a5a5e;
  --c-belief: #4a7a5a;
  --c-mem: #7a6a4a;
  --c-tom: #4a6a7a;
  --c-need: #5a4a7a;
  --c-rum: #71717a;
}
/* ... keep the root and body styles the same ... */

.mem-list { max-height:120px; overflow-y:auto; padding-right: 5px; }
.mem-item { 
    padding: 4px 0; 
    border-bottom: 0.5px solid var(--b); 
    display: flex; 
    gap: 10px; 
    align-items: baseline; 
    font-size: 12px; 
    opacity: 0.8; /* Fainted look */
}
.mem-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }

/* Schema Grid Styling */
.schema-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
.si { font-size: 12px; padding: 4px 0; display: flex; flex-direction: column; gap: 2px; }
.sl { font-family: var(--f); font-weight: bold; opacity: 0.85; }

/* Color coding for Schemas */
.si.neg .sl { color: #a84040; } /* Muted Red */
.si.pos .sl { color: #4a9e6b; } /* Muted Green */

.st { height: 2px; background: rgba(255,255,255,0.04); border-radius: 1px; overflow: hidden; width: 100%; }
.sf { height: 100%; transition: width 0.9s; }

/* CUSTOM SCROLLBARS (Fixes the white bar) */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 10px; }

body { background:var(--bg); color:var(--t); font-family:var(--f); min-height:100vh; padding:18px 16px 60px; max-width:660px; margin:0 auto; }

.header { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-bottom:12px; border-bottom:0.5px solid var(--b); }
.avatar { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:1.5px solid var(--b2);background:var(--bg3);flex-shrink:0; }
.mind-label { font-size:10px;color:var(--t3);text-transform:uppercase;font-family:var(--m); letter-spacing: 2px; }
.mind-status { font-size:12px;color:var(--t2);font-style:italic;margin-top:3px; }

.panel { border-radius:8px;border:0.5px solid var(--b);background:var(--bg2);padding:9px 11px;margin-bottom:9px; }
.panel-title { font-size:9px;color:var(--t3);font-family:var(--m);text-transform:uppercase;display:flex;justify-content:space-between;cursor:pointer; }

.sem-grid { display:flex;flex-wrap:wrap;gap:3px; margin-top: 5px; }
.sem-node { font-size:8px;font-family:var(--m);border-radius:3px;padding:1px 4px;border:0.5px solid var(--b); opacity: 0.8; }

.need-row { display:flex;gap:6px; margin-top:5px; }
.need-item { flex:1; }
.need-label { font-size:9px;color:var(--t3);font-family:var(--m);margin-bottom:2px; }
.need-track { height:3px;background:rgba(255,255,255,.04); }
.need-fill { height:100%;transition:width .9s; }

.state-row { display:flex;gap:5px;margin-bottom:9px; }
.scard { flex:1;min-width:0;border-radius:7px;padding:7px 9px;border:0.5px solid var(--b);background:var(--bg2); }
.sc-l { font-size:8px;color:var(--t3);text-transform:uppercase;font-family:var(--m); margin-bottom: 3px; }
.sc-v { font-size:11px;color:var(--t); }
.sc-s { font-size:9px;color:var(--t3);font-family:var(--m); }

.egrid { display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:9px; }
.ebar { border-radius:5px;padding:5px 6px;border:0.5px solid var(--b);background:var(--bg2); }
.ebar .el { font-size:9px;color:var(--t3);font-family:var(--m); }
.ebar .ei { font-size:8px;color:var(--t3);font-style:italic; }
.ebar .et { height:2px;background:rgba(255,255,255,.04); }
.ebar .ef { height:100%;transition:width .8s; }
.ebar .ev { font-size:9px;color:var(--t3);text-align:right;font-family:var(--m); }

/* Unified Info Row for Defense and ToM */
.info-row { display:flex; gap:5px; margin-bottom:9px; }
.info-card { flex:1; background:var(--bg2); border:0.5px solid var(--b); padding:8px 10px; border-radius:7px; }

/* THOUGHT STREAM FONT & COLORS */
.thought-stream { border-radius:8px;border:0.5px solid var(--b);background:var(--bg2);padding:12px;min-height:160px;max-height:350px;overflow-y:auto; margin-bottom:10px; }
.thought { padding:6px 0; border-bottom:0.5px solid var(--b); font-size:13px; display:flex; gap:10px; align-items: baseline; }
.thought .ts { font-size:9px; color:var(--t3); font-family:var(--m); min-width: 35px; }
.thought .tx { flex: 1; opacity: 0.75; } /* Fainted effect */

/* Color coding by Kind */
.thought.nv .tx { color: var(--c-somatic); font-style: italic; }
.thought.sem .tx { color: var(--c-belief); }
.thought.mem .tx { color: var(--c-mem); font-style: italic; }
.thought.tom .tx { color: var(--c-tom); }
.thought.need .tx { color: var(--c-need); }
.thought.rum .tx { color: var(--c-rum); }

.evgrid { display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px; }
.evbtn { border-radius:6px;padding:6px 4px;border:0.5px solid var(--b2);background:var(--bg2);font-size:10px;color:var(--t2);cursor:pointer; font-family: var(--f); }
.evbtn:hover { background:var(--bg3); color:var(--t); }

.tbar { border-radius:5px;padding:6px 8px;border:0.5px solid var(--b);background:var(--bg2); margin-bottom:4px; }
.tbar-label { font-size:9px;color:var(--t3);font-family:var(--m); }
.tbar-track { height:3px;background:rgba(255,255,255,.06); }
.tbar-fill { height:100%; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar" id="av">🧍</div>
  <div style="flex:1">
    <div class="mind-label">The Mind</div>
    <div class="mind-status" id="status">...</div>
  </div>
  <button class="evbtn" onclick="resetMind()">reset</button>
</div>

<div class="panel">
    <div class="panel-title">Fast-Forward</div>
    <textarea id="ff-input" style="width:100%;background:var(--bg3);border:0.5px solid var(--b2);color:white;font-size:11px;padding:8px;border-radius:6px;margin-bottom:6px; outline:none;" rows="2"></textarea>
    <div style="display:flex; gap:5px;">
        <button class="evbtn" style="flex:1" onclick="fastForward()">Run Development ↗</button>
        <button class="evbtn" onclick="fastForwardPreset('safe')">Safe</button>
        <button class="evbtn" onclick="fastForwardPreset('hard')">Hard</button>
    </div>
    <div id="ff-progress" style="font-size:9px;color:var(--t3);margin-top:4px; font-family: var(--m);"></div>
</div>

<div class="panel" id="p-cg">
    <div class="panel-title" onclick="togglePanel('p-cg','b-cg')"><span>Relational Working Model</span> <span class="ptog">▾</span></div>
    <div id="b-cg">
        <div id="cg-grid"></div>
        <div id="cg-iwm" style="font-size:9px;color:var(--t3);margin-top:6px; font-family: var(--m);"></div>
    </div>
</div>

<div class="panel" id="p-temp">
    <div class="panel-title" onclick="togglePanel('p-temp','temp-grid')"><span>Temperament (DNA)</span> <span class="ptog">▾</span></div>
    <div id="temp-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div>
</div>

<div class="panel" id="p-sem">
    <div class="panel-title" onclick="togglePanel('p-sem','sem-grid')"><span>Semantic Network</span> <span class="ptog">▾</span></div>
    <div id="sem-grid" class="sem-grid"></div>
</div>

<div class="panel">
    <div class="panel-title">Psychological Needs</div>
    <div class="need-row" id="need-row"></div>
</div>

<div class="panel">
    <div class="panel-title"><span>Memory & Beliefs</span> <span id="mem-count" style="opacity:0.5; font-family: var(--m);"></span></div>
    <div class="mem-list" id="mem-list" style="max-height: 80px; overflow-y: auto;"></div>
</div>

<div class="panel">
    <div class="panel-title">Active Schemas</div>
    <div id="schema-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
</div>

<div class="state-row">
  <div class="scard"><div class="sc-l">State</div><div class="sc-v" id="ds">Neutral</div><div class="sc-s" id="dn">—</div></div>
  <div class="scard"><div class="sc-l">Trend</div><div class="sc-v" id="tv">→ stable</div><div class="sc-s" id="ts2">—</div></div>
  <div class="scard"><div class="sc-l">Identity</div><div class="sc-v" id="dev-stage">Pre-verbal</div><div class="sc-s" id="dev-plasticity">—</div></div>
</div>

<div class="egrid" id="egrid"></div>

<div class="info-row">
  <div class="info-card">
    <div class="sc-l">Defense</div>
    <div id="defn" style="font-size:11px; font-weight:bold;">none</div>
    <div id="def-style" style="font-size:9px; color:var(--t3); font-family:var(--m); margin-top:2px;">Style forming...</div>
  </div>
  <div class="info-card">
    <div class="sc-l">Theory of Mind</div>
    <div id="tom-display" style="font-size:11px;">no social modeling yet</div>
  </div>
</div>

<div class="evgrid" id="evgrid"></div>
<div style="display:flex;gap:5px;margin-bottom:11px;">
  <input type="text" id="ci" placeholder="what happens..." style="flex:1;background:var(--bg2);border:0.5px solid var(--b2);color:white;padding:6px;border-radius:6px; outline:none; font-family:var(--f);" />
  <button class="evbtn" onclick="sendCustom()">apply</button>
</div>

<div class="thought-stream" id="stream"></div>

<!-- THE CORRECT LOAD ORDER -->
<script src="js/01-primes.js"></script>
<script src="js/02-network.js"></script>
<script src="js/03-temperament.js"></script>
<script src="js/04-emotions.js"></script>
<script src="js/16-body.js"></script>
<script src="js/17-chemistry.js"></script>
<script src="js/18-heartbreak.js"></script>
<script src="js/19-metacognition.js"></script>
<script src="js/20-windows.js"></script> <!-- Moved up -->
<script src="js/21-peers.js"></script>
<script src="js/05-caregiver.js"></script> <!-- Moved down so it can see windows -->
<script src="js/06-schemas.js"></script>
<script src="js/07-needs.js"></script>
<script src="js/08-memory.js"></script>
<script src="js/09-tom.js"></script>
<script src="js/10-defense.js"></script>
<script src="js/11-development.js"></script>
<script src="js/12-thoughts.js"></script>
<script src="js/13-events.js"></script>
<script src="js/14-render.js"></script>
<script src="js/15-main.js"></script>
</body>
</html>

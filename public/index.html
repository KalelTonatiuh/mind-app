<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mind</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0c0c0d; --bg2:#131315; --bg3:#191920;
  --b:rgba(255,255,255,0.055); --b2:rgba(255,255,255,0.1);
  --t:#dad7cf; --t2:#68665f; --t3:#3a3835;
  --f:'Georgia',serif; --m:'Courier New',monospace;
}
body { background:var(--bg); color:var(--t); font-family:var(--f); min-height:100vh; padding:18px 16px 60px; max-width:660px; margin:0 auto; }

.header { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-bottom:12px; border-bottom:0.5px solid var(--b); }
.avatar { width:44px;height:44px;border-radius:50%;border:1.5px solid var(--b2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px; }
.mind-label { font-size:10px;color:var(--t3);text-transform:uppercase;font-family:var(--m); }
.mind-status { font-size:12px;color:var(--t2);font-style:italic;margin-top:3px; }

.panel { border-radius:8px;border:0.5px solid var(--b);background:var(--bg2);padding:9px 11px;margin-bottom:9px; }
.panel-title { font-size:9px;color:var(--t3);font-family:var(--m);text-transform:uppercase;display:flex;justify-content:space-between;cursor:pointer; }

.grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px; }
.stat-card { border-radius:5px; padding:6px; border:0.5px solid var(--b); background:var(--bg3); }
.stat-l { font-size:8px; color:var(--t3); text-transform:uppercase; font-family:var(--m); }
.stat-v { font-size:11px; color:var(--t); }

.evgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-bottom:10px; }
.evbtn { border-radius:6px; padding:6px 4px; border:0.5px solid var(--b2); background:var(--bg2); font-size:10px; color:var(--t2); cursor:pointer; }
.evbtn:hover { background:var(--bg3); color:var(--t); }

.thought-stream { border-radius:8px; border:0.5px solid var(--b); background:var(--bg2); padding:12px; min-height:150px; max-height:300px; overflow-y:auto; margin-bottom: 20px;}
.thought { padding:4px 0; border-bottom:0.5px solid var(--b); font-size:13px; color:var(--t); display:flex; gap:10px; }
.thought .ts { font-size:9px; color:var(--t3); font-family:var(--m); }

/* Hidden helper elements to prevent JS crashes */
#egrid, #sem-grid, #mem-list, #need-row, #dn, #bn, #bs, #ts2, #defn, #defd, #def-style, #tom-display, #sem-count, #sem-plasticity, #schema-age, #mem-count { display:none; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar" id="av">🧍</div>
  <div style="flex:1">
    <div class="mind-label">The Mind</div>
    <div class="mind-status" id="status">...</div>
    <div id="dev-stage" style="font-size:10px; color:var(--t3)">Pre-verbal</div>
  </div>
  <button class="evbtn" onclick="resetMind()">reset</button>
</div>

<div class="thought-stream" id="stream"></div>

<div class="evgrid" id="evgrid"></div>

<div class="panel" id="p-state">
  <div class="panel-title" onclick="togglePanel('p-state','b-state')"><span>Vital Signs</span> <span class="ptog">▾</span></div>
  <div class="grid-2" id="b-state">
    <div class="stat-card"><div class="stat-l">Emotion</div><div class="stat-v" id="ds">Neutral</div></div>
    <div class="stat-card"><div class="stat-l">Trend</div><div class="stat-v" id="tv">Stable</div></div>
    <div class="stat-card" style="grid-column: span 2;"><div class="stat-l">Body</div><div class="stat-v" id="dev-plasticity">Awake</div></div>
  </div>
</div>

<div class="panel" id="p-care">
  <div class="panel-title" onclick="togglePanel('p-care','cg-grid')"><span>Relationship</span> <span class="ptog">▸</span></div>
  <div class="grid-2" id="cg-grid" style="display:none"></div>
  <div id="cg-iwm" style="font-size:9px; color:var(--t3); padding:5px;"></div>
</div>

<div class="panel" id="p-temp">
  <div class="panel-title" onclick="togglePanel('p-temp','temp-grid')"><span>Temperament</span> <span class="ptog">▸</span></div>
  <div class="grid-2" id="temp-grid" style="display:none"></div>
</div>

<div class="panel" id="p-core">
  <div class="panel-title" onclick="togglePanel('p-core','schema-grid')"><span>Beliefs</span> <span class="ptog">▸</span></div>
  <div class="grid-2" id="schema-grid" style="display:none"></div>
</div>

<!-- Technical placeholders -->
<div id="egrid"></div><div id="sem-grid"></div><div id="mem-list"></div><div id="need-row"></div>
<div id="dn"></div><div id="bn"></div><div id="bs"></div><div id="ts2"></div>
<div id="defn"></div><div id="defd"></div><div id="def-style"></div>
<div id="tom-display"></div><div id="sem-count"></div><div id="sem-plasticity"></div>
<div id="schema-age"></div><div id="mem-count"></div>

<script src="js/01-primes.js"></script>
<script src="js/02-network.js"></script>
<script src="js/03-temperament.js"></script>
<script src="js/04-emotions.js"></script>
<script src="js/05-caregiver.js"></script>
<script src="js/06-schemas.js"></script>
<script src="js/07-needs.js"></script>
<script src="js/08-memory.js"></script>
<script src="js/09-tom.js"></script>
<script src="js/10-defense.js"></script>
<script src="js/11-development.js"></script>
<script src="js/12-thoughts.js"></script>
<script src="js/13-events.js"></script>
<script src="js/14-render.js"></script>
<script src="js/16-body.js"></script>
<script src="js/15-main.js"></script>
</body>
</html>

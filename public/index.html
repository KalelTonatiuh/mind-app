<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mind — v8.0 Relational Subject</title>
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
            --bg:#070708; --bg2:#0f0f12; --bg3:#15151a;
            --b:rgba(255,255,255,0.04); --b2:rgba(255,255,255,0.08);
            --t:#c2bfb6; --t2:#5a5852; --t3:#2a2825;
            --f:'Georgia', serif; --m:'Courier New', monospace;
            --c-hyper: #ff8b8b; --c-hypo: #8baaff; --c-optimal: #60a57e; --c-collapse: #1a1a2e;
        }

        body { background:var(--bg); color:var(--t); font-family:var(--f); min-height:100vh; padding:20px; max-width:740px; margin:0 auto; line-height:1.4; }
        .header { display:flex; align-items:center; gap:15px; margin-bottom:20px; padding-bottom:15px; border-bottom:0.5px solid var(--b); }
        .avatar { width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--b2);background:var(--bg3); transition: all 1s; }
        .mind-label { font-size:10px;color:var(--t3);text-transform:uppercase;font-family:var(--m); letter-spacing: 2px; }
        .mind-status { font-size:11px;color:var(--t2);font-style:italic;margin-top:4px; }

        .panel { border-radius:10px;border:0.5px solid var(--b);background:var(--bg2);padding:12px;margin-bottom:12px; }
        .panel-title { font-size:9px;color:var(--t3);font-family:var(--m);text-transform:uppercase;display:flex;justify-content:space-between; margin-bottom: 8px; }

        /* Window & Orientation Visuals */
        .meter-label { font-size:8px; color:var(--t3); font-family:var(--m); margin-top:4px; }
        .wot-container { height:14px; background:var(--bg3); border-radius:4px; margin: 6px 0; position:relative; overflow:hidden; border:0.5px solid var(--b); }
        .wot-safe-zone { position:absolute; height:100%; background:rgba(96, 165, 126, 0.1); border-left:1px solid var(--c-optimal); border-right:1px solid var(--c-optimal); transition: all 1s; }
        .wot-indicator { position:absolute; width:2px; height:100%; background:white; transition: left 1s; z-index:5; }
        
        .orientation-reach { font-size:10px; font-family:var(--m); color:var(--c-optimal); margin-top:4px; opacity:0.8; }

        .egrid { display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px; }
        .ebar { border-radius:6px;padding:6px 8px;border:0.5px solid var(--b);background:var(--bg3); }
        .ebar .el { font-size:8px;color:var(--t2);font-family:var(--m); text-transform:uppercase; }
        .ebar .et { height:2px;background:rgba(255,255,255,.03); margin-top: 5px; }
        .ebar .ef { height:100%; transition: width 1s; background: var(--t2); }

        .thought-stream { border-radius:10px;border:0.5px solid var(--b);background:var(--bg2);padding:15px;height:400px;overflow-y:auto; margin-bottom:12px; display: flex; flex-direction: column-reverse; transition: background 2s; }
        .thought { padding:8px 0; border-bottom:0.5px solid var(--b); font-size:12px; display:flex; gap:12px; }
        .thought .ts { font-size:9px; color:var(--t3); font-family:var(--m); min-width: 60px; }
        .thought.meta { color: var(--c-optimal); }
        .thought.hyper { color: var(--c-hyper); font-style: italic; }
        .thought.hypo { color: var(--c-hypo); opacity:0.6; }
        .thought.implicit { color: #888; border-left: 2px solid #444; padding-left: 8px; }
        
        .evbtn { border-radius:8px;padding:8px 12px;border:1px solid var(--b2);background:var(--bg3);font-size:10px;color:var(--t2);cursor:pointer; font-family: var(--m); transition:0.3s; }
        .evbtn:hover { border-color:var(--t2); color:var(--t); }
        input[type="text"] { width:100%;background:var(--bg3);border:1px solid var(--b2);color:white;padding:12px;border-radius:8px; outline:none; font-family:var(--f); margin-bottom: 12px; }
        
        .attunement-slider { width:100px; cursor:pointer; vertical-align:middle; opacity:0.6; }
    </style>
</head>
<body>

<div class="header">
    <div class="avatar" id="avatar">...</div>
    <div style="flex:1">
        <div class="mind-label">Relational Subject Engine v8.0</div>
        <div class="mind-status" id="status">Awaiting contact...</div>
    </div>
    <div class="ebar" style="min-width:140px;">
        <div class="el">Caregiver Attunement <span id="att-val">50</span>%</div>
        <input type="range" min="0" max="100" value="50" class="attunement-slider" id="att-slider">
    </div>
</div>

<div class="panel">
    <div class="panel-title">Window of Tolerance & Gravitational Orientation</div>
    <div class="wot-container">
        <div id="wot-zone" class="wot-safe-zone"></div>
        <div id="wot-pos" class="wot-indicator"></div>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:8px; font-family:var(--m); color:var(--t3);">
        <span>COLLAPSE | HYPO</span>
        <span>WINDOW OF TOLERANCE</span>
        <span>HYPERAROUSAL</span>
    </div>
    <div id="reach-text" class="orientation-reach">Reaching for...</div>
</div>

<div class="panel-title">Biological Substrate</div>
<div class="egrid">
    <div class="ebar"><div class="el">Cortisol</div><div class="et"><div id="bar-cortisol" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Oxytocin</div><div class="et"><div id="bar-oxytocin" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Relatedness</div><div class="et"><div id="bar-rel" class="ef"></div></div></div>
    <div class="ebar"><div class="el">Shadow</div><div class="et"><div id="bar-shadow" class="ef" style="background:#5a3a3a"></div></div></div>
</div>

<div class="thought-stream" id="stream"></div>

<div class="panel">
    <input type="text" id="event-input" placeholder="Enter stimulus...">
    <div style="display:flex; gap:8px;">
        <button class="evbtn" style="flex:2" onclick="processManualEvent()">Submit Event</button>
        <button class="evbtn" onclick="fastForwardPreset('safe')">Co-regulation (Safe)</button>
        <button class="evbtn" onclick="fastForwardPreset('hard')">Isolation (Hard)</button>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   THE RELATIONAL CORE
   ═══════════════════════════════════════════════════════ */
const Mind = {
    actual: { cortisol: 50, oxytocin: 50, relatedness: 50, shadow: 10 },
    lastActual: null,
    
    wot: { min: 35, max: 65 }, // The Resilience Window
    attunement: 0.5, // The Relational Repair Multiplier
    
    orientation: 'safety', // The Gravitational Pull
    memories: [],
    tickCount: 0,
    nextMetaTick: 0
};

/* ═══════════════════════════════════════════════════════
   HEARTBEAT & AUTONOMOUS REACH
   ═══════════════════════════════════════════════════════ */
function pulse() {
    Mind.tickCount++;
    if (!Mind.lastActual) Mind.lastActual = {...Mind.actual};

    const arousal = Mind.actual.cortisol;
    const attunement = document.getElementById('att-slider').value / 100;
    document.getElementById('att-val').innerText = Math.round(attunement * 100);

    // 1. STATE CLASSIFICATION
    let state = "OPTIMAL";
    if (arousal > Mind.wot.max) state = "HYPER";
    else if (arousal < 15) state = "COLLAPSE"; // Total Shutdown
    else if (arousal < Mind.wot.min) state = "HYPO";

    // 2. RELATIONSHIP-BASED WINDOW REPAIR
    if (state === "OPTIMAL") {
        // Co-regulation expands the window. Attunement is the multiplier.
        const expansion = 0.05 * (1 + attunement);
        Mind.wot.max = Math.min(90, Mind.wot.max + expansion);
        Mind.wot.min = Math.max(10, Mind.wot.min - expansion);
    } else {
        // Isolation or Dysregulation shrinks the window.
        const shrinkage = 0.1 * (2 - attunement); 
        Mind.wot.max -= shrinkage;
        Mind.wot.min += shrinkage;
    }

    // 3. GRAVITATIONAL REACH (Autonomous Pull)
    updateOrientation();
    applyAutonomousReach();

    // 4. IMPLICIT INTRUSION (Somatic only)
    if (state === "HYPER" && Math.random() > 0.9 && Mind.memories.length > 0) {
        triggerImplicitIntrusion();
    }

    // 5. THOUGHT GENERATION
    const stream = document.getElementById('stream');
    if (state === "COLLAPSE") {
        // Complete Silence
        stream.style.background = "#020205";
        logTimestampOnly();
    } else {
        stream.style.background = "var(--bg2)";
        const metaInterval = state === "HYPER" ? 1 : state === "HYPO" ? 6 : 3;
        if (Mind.tickCount >= Mind.nextMetaTick) {
            generateThought(state);
            Mind.nextMetaTick = Mind.tickCount + metaInterval;
        }
    }

    // Biological Decay
    Mind.actual.cortisol += (50 - Mind.actual.cortisol) * 0.05; 
    Mind.lastActual = {...Mind.actual};
    updateUI(state);
}

function updateOrientation() {
    // Reaching for what is most depleted
    const needs = { connection: Mind.actual.relatedness, safety: (100 - Mind.actual.cortisol), integrity: (100 - Mind.actual.shadow) };
    Mind.orientation = Object.keys(needs).reduce((a, b) => needs[a] < needs[b] ? a : b);
    document.getElementById('reach-text').innerText = `Orientation: Reaching for ${Mind.orientation.toUpperCase()}...`;
}

function applyAutonomousReach() {
    // Every tick, the mind "leans" toward its orientation
    if (Mind.orientation === 'connection') Mind.actual.relatedness += 0.2;
    if (Mind.orientation === 'safety') Mind.actual.cortisol -= 0.2;
    if (Mind.orientation === 'integrity') Mind.actual.shadow -= 0.2;
}

function triggerImplicitIntrusion() {
    const trauma = Mind.memories.find(m => m.isTraumatic);
    if (!trauma) return;

    const narrativeFailed = Math.random() > 0.6;
    if (narrativeFailed) {
        logThought("[SYSTEM] Unexplained somatic activation. Implicit recall.", "implicit");
    } else {
        logThought(`[INTRUSION] Memory fragments: "${trauma.text}"`, "implicit");
    }
    
    // Body remembers the specific channel
    if (trauma.channel === 'cortisol') Mind.actual.cortisol += 15;
    if (trauma.channel === 'shadow') Mind.actual.shadow += 10;
    if (trauma.channel === 'relatedness') Mind.actual.relatedness -= 15;
}

function generateThought(state) {
    if (state === "HYPER") {
        const dShadow = Mind.actual.shadow - Mind.lastActual.shadow;
        let msg = dShadow > 1 ? "Internal boundaries leaking. Shadow pressure." : "Arousal flooding the mirror. Cannot reflect.";
        logThought(msg, "hyper");
    } else if (state === "HYPO") {
        logThought("Signaling distance... internal volume dropping.", "hypo");
    } else {
        logThought(`Synthesis: Coherent state. Gravitating toward ${Mind.orientation}.`, "meta");
    }
}

/* ═══════════════════════════════════════════════════════
   STIMULI & RELATIONAL ENCODING
   ═══════════════════════════════════════════════════════ */
function processManualEvent(customText = null) {
    const val = customText || document.getElementById('event-input').value;
    if (!val) return;

    const attunement = document.getElementById('att-slider').value / 100;
    const isNegative = val.toLowerCase().match(/(hit|leave|no|hurt|loud|bang|shout|bad|alone)/);

    // Somatic Channel Capture
    const channels = { cortisol: Mind.actual.cortisol, shadow: Mind.actual.shadow, relatedness: (100-Mind.actual.relatedness) };
    const bestChannel = Object.keys(channels).reduce((a, b) => channels[a] > channels[b] ? a : b);

    if (isNegative) {
        Mind.actual.cortisol += (25 * (1 - attunement)); // Attunement buffers the hit
        Mind.actual.relatedness -= 20;
    } else {
        // Healing Event
        Mind.actual.oxytocin += (20 * attunement);
        Mind.actual.cortisol -= (15 * attunement);
        Mind.actual.relatedness += (15 * attunement);
    }

    Mind.memories.push({ text: val, isTraumatic: isNegative, channel: bestChannel });
    document.getElementById('event-input').value = "";
}

async function fastForwardPreset(type) {
    for (let i = 0; i < 4; i++) {
        processManualEvent(type === 'hard' ? "Disconnected stressor" : "Attuned safety");
        await new Promise(r => setTimeout(r, 400));
    }
}

function logThought(text, type) {
    const stream = document.getElementById('stream');
    const div = document.createElement('div');
    div.className = `thought ${type}`;
    const ts = new Date().toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
    div.innerHTML = `<span class="ts">${ts}</span> <span class="tx">${text}</span>`;
    stream.prepend(div);
}

function logTimestampOnly() {
    const stream = document.getElementById('stream');
    const div = document.createElement('div');
    div.className = `thought`;
    const ts = new Date().toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
    div.innerHTML = `<span class="ts">${ts}</span> <span class="tx" style="opacity:0.2;">...</span>`;
    stream.prepend(div);
}

function updateUI(state) {
    document.getElementById('bar-cortisol').style.width = `${Mind.actual.cortisol}%`;
    document.getElementById('bar-oxytocin').style.width = `${Mind.actual.oxytocin}%`;
    document.getElementById('bar-rel').style.width = `${Mind.actual.relatedness}%`;
    document.getElementById('bar-shadow').style.width = `${Mind.actual.shadow}%`;

    const wotZone = document.getElementById('wot-zone');
    wotZone.style.left = `${Mind.wot.min}%`;
    wotZone.style.width = `${Mind.wot.max - Mind.wot.min}%`;
    document.getElementById('wot-pos').style.left = `${Mind.actual.cortisol}%`;

    const avatar = document.getElementById('avatar');
    if (state === "COLLAPSE") { avatar.innerText = "⚫"; avatar.style.opacity = 0.3; }
    else if (state === "HYPO") { avatar.innerText = "😶"; avatar.style.opacity = 0.6; }
    else if (state === "HYPER") { avatar.innerText = "🤯"; avatar.style.opacity = 1.0; }
    else { avatar.innerText = "🧑"; avatar.style.opacity = 0.8; }
    
    document.getElementById('status').innerText = `State: ${state} | Window: ${(Mind.wot.max - Mind.wot.min).toFixed(1)}% | Subjectivity Active`;
}

setInterval(pulse, 4500);
updateUI("OPTIMAL");
logThought("Relational Subjectivity Online. Reaching for orientation...", "meta");
</script>
</body>
</html>
